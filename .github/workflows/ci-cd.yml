name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Simular build
      run: echo "Build realizado com sucesso!"

    - name: Simular testes
      run: echo "Testes passaram com sucesso!"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Simular deploy
      run: echo "Deploy realizado com sucesso!"
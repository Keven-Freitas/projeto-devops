name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build
      run: echo "Build OK"

    - name: Test
      run: echo "Testes OK"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy
      run: echo "Deploy OK"

      - name: Enviar alerta para Discord
  run: |
    curl -H "Content-Type: application/json" \
    -d '{"content": "🚀 Pipeline executado com sucesso!"}' \
    ${{ secrets.DISCORD_WEBHOOK }}
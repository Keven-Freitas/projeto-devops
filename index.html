<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora DevOps - PUCPR</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .calc-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 60px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #28a745; }
    </style>
</head>
<body>
    <div class="calc-card">
        <h2>Calculadora DevOps 🚀</h2>
        <input type="number" id="n1" placeholder="0">
        <span> + </span>
        <input type="number" id="n2" placeholder="0">
        <br><br>
        <button onclick="somar()">Somar</button>
        <div id="result">Resultado: -</div>
        <p style="font-size: 0.8rem; color: #666;">Semana 4 - Docker & CI/CD</p>
    </div>

    <script>
        function somar() {
            const v1 = parseFloat(document.getElementById('n1').value) || 0;
            const v2 = parseFloat(document.getElementById('n2').value) || 0;
            document.getElementById('result').innerText = `Resultado: ${v1 + v2}`;
        }
    </script>
</body>
</html>
